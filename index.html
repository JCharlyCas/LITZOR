<style>

    --white: #f5f3ef;

    --celeste: #7ab8d4;
    --celeste-light: #b3d9ec;

    --olive: #6b7c4f;
    --olive-light: #8fa068;

    --cream: #d4c9b0;
    --glass-bg: rgba(245, 243, 239, 0.06);
    --glass-border: rgba(245, 243, 239, 0.12);
    --glass-dark: rgba(10, 10, 10, 0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }
